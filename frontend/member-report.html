<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Report</title>
<link rel="stylesheet" href="css/member-report.css">
</head>
<body>

<nav class="navbar">
    <h2>Team Task Manager</h2>

    <div>
        <a href="dashboard.html">Dashboard</a>
        <a href="projects.html">Projects</a>
        <a href="tasks.html">Tasks</a>
        <a href="members.html">Members</a>
        <a href="profile.html">Profile</a>
        <button onclick="logout()">Logout</button>
    </div>
</nav>

<section style="padding:40px">

    <div class="card" style="
        padding:30px;
        border-radius:20px;
        background:white;
        box-shadow:0 10px 25px rgba(0,0,0,.08);
        margin-bottom:30px;
    ">
        <h1 id="name">Loading...</h1>
        <p id="email"></p>

        <br>

        <span id="role" style="
            background:#2563eb;
            color:white;
            padding:8px 18px;
            border-radius:30px;
            font-weight:600;
        ">
        </span>

        <span id="badge" style="
            margin-left:15px;
            background:#16a34a;
            color:white;
            padding:8px 18px;
            border-radius:30px;
            font-weight:600;
        ">
        </span>
    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <h3>Projects</h3>
            <h1 id="projects">0</h1>
        </div>

        <div class="stat-card">
            <h3>Assigned</h3>
            <h1 id="assigned">0</h1>
        </div>

        <div class="stat-card">
            <h3>Completed</h3>
            <h1 id="completed">0</h1>
        </div>

        <div class="stat-card">
            <h3>Pending</h3>
            <h1 id="pending">0</h1>
        </div>

        <div class="stat-card">
            <h3>In Progress</h3>
            <h1 id="progress">0</h1>
        </div>

        <div class="stat-card">
            <h3>Overdue</h3>
            <h1 id="overdue">0</h1>
        </div>

    </div>

    <div class="card" style="
        margin-top:30px;
        padding:30px;
        background:white;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,.08);
    ">
        <h2>Completion Rate</h2>
        <br>

        <div style="
            width:100%;
            height:25px;
            background:#eee;
            border-radius:30px;
            overflow:hidden;
        ">
            <div id="progressBar" style="
                width:0%;
                height:100%;
                background:linear-gradient(90deg,#2563eb,#16a34a);
            "></div>
        </div>

        <br>

        <h2 id="rate">0%</h2>
        <br>

        <h2>
            Efficiency Score:
            <span id="efficiency">0</span>/100
        </h2>
    </div>

</section>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/logout.js"></script>
<script src="js/member-report.js"></script>

</body>
</html>
